name: Update Flight Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 설치와 실행 환경을 완벽하게 일치시키기 위해 python -m 사용
          python -m pip install FlightRadar24API

      - name: Run Scraper
        # 여기서도 python -m으로 패키지를 인식하도록 시도하거나 직접 실행
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.js
          git commit -m "Update flight data (Scheduled)" || exit 0
          git push
