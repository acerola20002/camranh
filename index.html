<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CXR 국제선 전광판</title>
    <style>
        body { background: #000; color: #ffcc00; font-family: sans-serif; padding: 10px; margin: 0; }
        .header { text-align: center; margin-bottom: 20px; padding: 20px 10px; border-bottom: 1px solid #222; }
        .update-tag { color: #888; font-size: 0.9em; margin-bottom: 8px; }
        
        /* 상단 안내 문구 스타일 */
        .disclaimer { 
            color: #ff4400; /* 주의를 위해 약간 붉은 계열의 색상 사용 */
            font-size: 0.85em; 
            margin-bottom: 15px; 
            line-height: 1.5;
            word-break: keep-all;
        }

        .tab-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            padding: 15px 40px; font-size: 1.2em; cursor: pointer;
            background: #222; border: 2px solid #444; color: #888; border-radius: 5px;
        }
        .tab-btn.active { 
            background: #ffcc00; color: #000; border-color: #ffcc00; font-weight: bold;
        }

        table { width: 100%; border-collapse: collapse; display: none; }
        table.active { display: table; }
        th { background: #333; color: #fff; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #222; text-align: center; }
        .status-box { font-weight: bold; color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <h1>✈️ CAM RANH (CXR) INTERNATIONAL</h1>
    <div id="update-notice" class="update-tag">매시 정각 자동 업데이트 됩니다. (마지막 수집: -)</div>
    
    <div class="disclaimer">
        본 정보는 FlightRadar24 데이터를 기반으로 매시 정각 자동 업데이트되는 참고용 전광판입니다.<br>
        실제 운항 상황은 항공사 공식 정보를 꼭 확인하세요!
    </div>
</div>

<div class="tab-container">
    <div id="btn-arr" class="tab-btn active" onclick="showTab('도착')">▼ ARRIVALS (도착)</div>
    <div id="btn-dep" class="tab-btn" onclick="showTab('출발')">▲ DEPARTURES (출발)</div>
</div>

<table id="main-table">
    <thead>
        <tr>
            <th>DATE/TIME</th><th>FLIGHT</th><th>CITY</th><th>STATUS</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

<script src="data.js"></script>
<script>
    document.getElementById('update-notice').innerText = `매시 정각 자동 업데이트 됩니다. (베트남 기준: ${flightInfo.lastUpdate})`;

    function showTab(type) {
        document.getElementById('btn-arr').classList.toggle('active', type === '도착');
        document.getElementById('btn-dep').classList.toggle('active', type === '출발');

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        const filtered = flightInfo.data.filter(f => f.type === type);
        filtered.forEach(f => {
            const row = `<tr>
                <td style="color:#aaa">${f.time}</td>
                <td style="font-size:1.1em; color:#fff">${f.flight}</td>
                <td>${f.city}</td>
                <td class="status-box">${f.status}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById('main-table').classList.add('active');
    }

    showTab('도착');
</script>

</body>
</html>
